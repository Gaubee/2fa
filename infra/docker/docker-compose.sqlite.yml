services:
  server:
    build:
      context: ../..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "${GAUBEE_2FA_HTTP_PORT:-8080}:8080"
      - "${GAUBEE_2FA_GRPC_PORT:-50051}:50051"
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      GAUBEE_2FA_HTTP: 0.0.0.0:8080
      GAUBEE_2FA_GRPC: 0.0.0.0:50051
      GAUBEE_2FA_DB: ${GAUBEE_2FA_DB:-sqlite}
      GAUBEE_2FA_DATABASE_URL: ${GAUBEE_2FA_DATABASE_URL:-sqlite:///data/gaubee-2fa.db?mode=rwc}
      GAUBEE_2FA_ADMIN_TOKEN: ${GAUBEE_2FA_ADMIN_TOKEN:-}
    volumes:
      - gaubee_2fa_sqlite:/data

  server-admin:
    build:
      context: ../..
      dockerfile: server-admin/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    environment:
      SERVER_UPSTREAM: ${GAUBEE_2FA_SERVER_UPSTREAM:-http://server:8080}
    ports:
      - "${GAUBEE_2FA_ADMIN_PORT:-4173}:80"

volumes:
  gaubee_2fa_sqlite:
