<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <style>
    .fill {
      fill: #16b7a7;
    }
  </style>
  <defs>
    <filter id="fgFilter">
      <feColorMatrix type="saturate" values=".68" />
      <feComponentTransfer>
        <feFuncR type="linear" slope="1.35" />
        <feFuncG type="linear" slope="1.35" />
        <feFuncB type="linear" slope="1.35" />
      </feComponentTransfer>
    </filter>
    <filter id="blurFilter" x="0" y="0">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" />
    </filter>

    <path
      id="bg-1"
      d="M40 228m101.5-27.5l514-139.5q101.5-27.5 129 74l156 576q27.5 101.5-74 129l-514 139.5q-101.5 27.5-129-74l-156-576q-27.5-101.5 74-129Z"
    />
    <circle id="bg-2" cx="910" cy="186" r="64" />
    <rect id="fg" x="170" y="170" width="684" height="684" rx="156" ry="156" />

    <path
      id="shield"
      d="M512 280c83 64 166 64 249 0v198c0 142-95 262-249 318-154-56-249-176-249-318V280c83 64 166 64 249 0Z"
    />
